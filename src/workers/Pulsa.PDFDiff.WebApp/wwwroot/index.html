<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsa PDF Diff</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <header>
        <h1>Pulsa PDF Diff</h1>
        <button id="settingsBtn" title="설정">⚙</button>
    </header>

    <main>
        <section class="upload-section">
            <div class="drop-zone" id="refZone">
                <p class="drop-label">기준 문서</p>
                <p class="drop-hint">PDF 파일을 드래그하거나 클릭</p>
                <p class="file-name" id="refName"></p>
                <input type="file" accept=".pdf" id="refInput" hidden>
            </div>
            <div class="drop-zone" id="tgtZone">
                <p class="drop-label">작업 문서</p>
                <p class="drop-hint">PDF 파일을 드래그하거나 클릭</p>
                <p class="file-name" id="tgtName"></p>
                <input type="file" accept=".pdf" id="tgtInput" hidden>
            </div>
        </section>

        <!-- Page Mapping Table -->
        <section class="mapping-section" id="mappingSection" hidden>
            <div class="mapping-header">
                <h3>페이지 매핑</h3>
                <button id="addMappingBtn" class="small-btn">+ 행 추가</button>
            </div>
            <p class="mapping-hint" id="mappingHint" hidden>매핑이 없으면 전체 페이지를 한 번에 비교합니다.</p>
            <table class="mapping-table" id="mappingTable">
                <thead>
                    <tr>
                        <th>기준 페이지</th>
                        <th>작업 페이지</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="mappingBody"></tbody>
            </table>
        </section>

        <section class="prompt-section">
            <div class="prompt-header">
                <label for="promptSelect">프롬프트:</label>
                <select id="promptSelect"></select>
                <button id="editPromptBtn">편집</button>
            </div>
            <textarea id="promptEditor" hidden></textarea>
        </section>

        <button id="compareBtn" class="primary-btn" disabled>비교 실행</button>

        <!-- Progress -->
        <div class="progress-bar-container" id="progressContainer" hidden>
            <div class="progress-info">
                <span id="progressText">0 / 0 페이지 완료</span>
                <span id="progressTokens"></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <section class="report-section" id="reportSection" hidden>
            <h2>교정 리포트</h2>
            <div id="reportContent"></div>
            <div class="token-summary" id="tokenSummary" hidden>
                <h3>토큰 사용량</h3>
                <table>
                    <thead><tr><th>구분</th><th>프롬프트</th><th>완료</th><th>합계</th></tr></thead>
                    <tbody id="tokenBody"></tbody>
                    <tfoot id="tokenFoot"></tfoot>
                </table>
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" hidden>
        <div class="modal">
            <h2>설정</h2>
            <label>
                OpenAI API Key
                <input type="password" id="apiKeyInput">
            </label>
            <label>
                모델
                <select id="modelSelect"></select>
                <input type="text" id="modelInput" value="gpt-4o" placeholder="모델명 직접 입력">
            </label>
            <div class="modal-actions">
                <button id="saveSettingsBtn" class="primary-btn">저장</button>
                <button id="closeSettingsBtn">취소</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
