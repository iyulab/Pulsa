<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulsaPDFDiff</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <header>
        <h1>PulsaPDFDiff</h1>
        <button id="settingsBtn" title="설정">⚙</button>
    </header>

    <main>
        <section class="upload-section">
            <div class="drop-zone" id="refZone">
                <p class="drop-label">기준 문서</p>
                <p class="drop-hint">PDF 파일을 드래그하거나 클릭</p>
                <p class="file-name" id="refName"></p>
                <input type="file" accept=".pdf" id="refInput" hidden>
            </div>
            <div class="drop-zone" id="tgtZone">
                <p class="drop-label">작업 문서</p>
                <p class="drop-hint">PDF 파일을 드래그하거나 클릭</p>
                <p class="file-name" id="tgtName"></p>
                <input type="file" accept=".pdf" id="tgtInput" hidden>
            </div>
        </section>

        <section class="prompt-section">
            <div class="prompt-header">
                <label for="promptSelect">프롬프트:</label>
                <select id="promptSelect"></select>
                <button id="editPromptBtn">편집</button>
            </div>
            <textarea id="promptEditor" hidden></textarea>
        </section>

        <button id="compareBtn" class="primary-btn" disabled>비교 실행</button>

        <section class="report-section" id="reportSection" hidden>
            <h2>교정 리포트</h2>
            <div id="reportContent"></div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" hidden>
        <div class="modal">
            <h2>설정</h2>
            <label>
                OpenAI API Key
                <input type="password" id="apiKeyInput">
            </label>
            <label>
                모델
                <input type="text" id="modelInput" value="gpt-4o">
            </label>
            <div class="modal-actions">
                <button id="saveSettingsBtn" class="primary-btn">저장</button>
                <button id="closeSettingsBtn">취소</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" hidden>
        <div class="spinner"></div>
        <p>LLM 비교 분석 중...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
