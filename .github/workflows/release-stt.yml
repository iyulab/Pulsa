name: Release PulsaSTT

on:
  push:
    tags: ['stt-v*']
  workflow_call:
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/PulsaSTT/PulsaSTT.csproj)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/PulsaSTT/PulsaSTT.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:DebugType=none
          -o publish/PulsaSTT

      - name: Package
        shell: bash
        run: cd publish/PulsaSTT && 7z a -tzip ../PulsaSTT-win-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stt-v${{ steps.version.outputs.version }}
          name: PulsaSTT v${{ steps.version.outputs.version }}
          files: publish/PulsaSTT-win-x64.zip
