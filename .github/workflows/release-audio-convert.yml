name: Release PulsaAudioConvert

on:
  push:
    tags: ['audio-convert-v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' src/PulsaAudioConvert/PulsaAudioConvert.csproj)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/PulsaAudioConvert/PulsaAudioConvert.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -o publish/PulsaAudioConvert

      - name: Package
        shell: bash
        run: cd publish && 7z a -tzip PulsaAudioConvert-win-x64.zip PulsaAudioConvert/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: audio-convert-v${{ steps.version.outputs.version }}
          name: PulsaAudioConvert v${{ steps.version.outputs.version }}
          files: publish/PulsaAudioConvert-win-x64.zip
