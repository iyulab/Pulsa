name: Release PulsaAudioConvert

on:
  push:
    tags: ['audio-convert-v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#audio-convert-v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/PulsaAudioConvert/PulsaAudioConvert.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/PulsaAudioConvert

      - name: Package
        shell: bash
        run: cd publish && 7z a -tzip PulsaAudioConvert-win-x64.zip PulsaAudioConvert/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PulsaAudioConvert v${{ steps.version.outputs.version }}
          files: publish/PulsaAudioConvert-win-x64.zip
