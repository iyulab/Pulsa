name: Auto Tag

on:
  push:
    branches: [main]
    paths: ['src/**/*.csproj']

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      stt-changed: ${{ steps.stt.outputs.changed }}
      llm-changed: ${{ steps.llm.outputs.changed }}
      audio-changed: ${{ steps.audio.outputs.changed }}
      pdfdiff-changed: ${{ steps.pdfdiff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check PulsaSTT
        id: stt
        shell: bash
        run: |
          if ! git diff HEAD~1 HEAD --name-only | grep -q "src/tools/PulsaSTT/PulsaSTT.csproj"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/tools/PulsaSTT/PulsaSTT.csproj)
          tag="stt-v${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "tag=${tag}" >> $GITHUB_OUTPUT
          fi

      - name: Check PulsaLLM
        id: llm
        shell: bash
        run: |
          if ! git diff HEAD~1 HEAD --name-only | grep -q "src/tools/PulsaLLM/PulsaLLM.csproj"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/tools/PulsaLLM/PulsaLLM.csproj)
          tag="llm-v${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "tag=${tag}" >> $GITHUB_OUTPUT
          fi

      - name: Check PulsaAudioConvert
        id: audio
        shell: bash
        run: |
          if ! git diff HEAD~1 HEAD --name-only | grep -q "src/tools/PulsaAudioConvert/PulsaAudioConvert.csproj"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/tools/PulsaAudioConvert/PulsaAudioConvert.csproj)
          tag="audio-convert-v${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "tag=${tag}" >> $GITHUB_OUTPUT
          fi

      - name: Check PulsaPDFDiff
        id: pdfdiff
        shell: bash
        run: |
          if ! git diff HEAD~1 HEAD --name-only | grep -q "src/tools/PulsaPDFDiff/PulsaPDFDiff.csproj"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/tools/PulsaPDFDiff/PulsaPDFDiff.csproj)
          tag="pdfdiff-v${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "tag=${tag}" >> $GITHUB_OUTPUT
          fi

      - name: Create tags
        shell: bash
        run: |
          if [ "${{ steps.stt.outputs.changed }}" == "true" ]; then
            git tag ${{ steps.stt.outputs.tag }}
            git push origin ${{ steps.stt.outputs.tag }}
          fi
          if [ "${{ steps.llm.outputs.changed }}" == "true" ]; then
            git tag ${{ steps.llm.outputs.tag }}
            git push origin ${{ steps.llm.outputs.tag }}
          fi
          if [ "${{ steps.audio.outputs.changed }}" == "true" ]; then
            git tag ${{ steps.audio.outputs.tag }}
            git push origin ${{ steps.audio.outputs.tag }}
          fi
          if [ "${{ steps.pdfdiff.outputs.changed }}" == "true" ]; then
            git tag ${{ steps.pdfdiff.outputs.tag }}
            git push origin ${{ steps.pdfdiff.outputs.tag }}
          fi

  release-stt:
    needs: detect-changes
    if: needs.detect-changes.outputs.stt-changed == 'true'
    uses: ./.github/workflows/release-stt.yml
    permissions:
      contents: write

  release-llm:
    needs: detect-changes
    if: needs.detect-changes.outputs.llm-changed == 'true'
    uses: ./.github/workflows/release-llm.yml
    permissions:
      contents: write

  release-audio:
    needs: detect-changes
    if: needs.detect-changes.outputs.audio-changed == 'true'
    uses: ./.github/workflows/release-audio-convert.yml
    permissions:
      contents: write

  release-pdfdiff:
    needs: detect-changes
    if: needs.detect-changes.outputs.pdfdiff-changed == 'true'
    uses: ./.github/workflows/release-pdfdiff.yml
    permissions:
      contents: write
