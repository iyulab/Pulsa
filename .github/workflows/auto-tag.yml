name: Auto Tag

on:
  push:
    branches: [main]
    paths: ['src/**/*.csproj']

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - project: src/PulsaSTT/PulsaSTT.csproj
            prefix: stt-v
          - project: src/PulsaLLM/PulsaLLM.csproj
            prefix: llm-v
          - project: src/PulsaAudioConvert/PulsaAudioConvert.csproj
            prefix: audio-convert-v
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        shell: bash
        run: |
          if ! git diff HEAD~1 HEAD --name-only | grep -q "${{ matrix.project }}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          version=$(grep -oP '(?<=<Version>)[^<]+' "${{ matrix.project }}")
          tag="${{ matrix.prefix }}${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "tag=${tag}" >> $GITHUB_OUTPUT
            echo "version=${version}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git tag ${{ steps.check.outputs.tag }}
          git push origin ${{ steps.check.outputs.tag }}
