name: Build

on:
  push:
    branches: [main]
    paths: ['src/**']
  pull_request:
    branches: [main]
    paths: ['src/**']

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        project:
          - src/PulsaSTT/PulsaSTT.csproj
          - src/PulsaAudioConvert/PulsaAudioConvert.csproj
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release
