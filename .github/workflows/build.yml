name: Build

on:
  push:
    branches: [main]
    paths: ['src/**']
  pull_request:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        project:
          - src/tools/PulsaSTT/PulsaSTT.Worker/PulsaSTT.Worker.csproj
          - src/tools/PulsaAudioConvert/PulsaAudioConvert.Worker/PulsaAudioConvert.Worker.csproj
          - src/tools/PulsaLLM/PulsaLLM.Worker/PulsaLLM.Worker.csproj
          - src/tools/PulsaPDFDiff/PulsaPDFDiff.WebApp/PulsaPDFDiff.WebApp.csproj
          - src/tools/PulsaSTT/PulsaSTT.SDK/PulsaSTT.SDK.csproj
          - src/tools/PulsaLLM/PulsaLLM.SDK/PulsaLLM.SDK.csproj
          - src/tools/PulsaAudioConvert/PulsaAudioConvert.SDK/PulsaAudioConvert.SDK.csproj
          - src/tools/PulsaPDFDiff/PulsaPDFDiff.SDK/PulsaPDFDiff.SDK.csproj
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release
