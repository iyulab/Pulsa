name: Release PulsaLLM

on:
  push:
    tags: ['llm-v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/PulsaLLM/PulsaLLM.csproj)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/PulsaLLM/PulsaLLM.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:DebugType=none
          -o publish/PulsaLLM

      - name: Package
        shell: bash
        run: cd publish/PulsaLLM && 7z a -tzip ../PulsaLLM-win-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llm-v${{ steps.version.outputs.version }}
          name: PulsaLLM v${{ steps.version.outputs.version }}
          files: publish/PulsaLLM-win-x64.zip
